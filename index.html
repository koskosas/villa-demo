<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Villa Solaris — Private Beachfront Estate, Halkidiki</title>

<link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)"/>
<link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin/>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@200;300;400;500&display=swap)" rel="stylesheet"/>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:#0c0a07;
  color:#ede8df;
  font-family:'Inter',sans-serif;
  font-weight:300;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
:root{
  --warm:#ede8df;
  --warm-dim:#b9afa1;
  --warm-lo:#7d7266;
  --gold:#b8914a;
  --gold-hi:#d4a85c;
  --gold-lo:#7a5e2e;
  --ink:#0c0a07;
  --ink2:#141108;
  --ink3:#1c1710;
  --ink4:#252016;
  --stone:#f2ece0;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',sans-serif;
}
a{color:inherit;text-decoration:none}
img{display:block;width:100%;height:100%;object-fit:cover}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:var(--ink);
  z-index:10000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1.5rem;
  transition:opacity 1.2s ease,visibility 1.2s ease;
}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{
  font-family:var(--serif);
  font-size:clamp(1.9rem,5vw,2.6rem);
  font-style:italic;
  font-weight:300;
  color:var(--warm);
  opacity:0;
  animation:ldFade .8s .3s ease forwards;
  letter-spacing:.04em;
}
.ld-sub{
  font-size:clamp(.62rem,2vw,.72rem);
  letter-spacing:.38em;
  text-transform:uppercase;
  color:var(--gold);
  opacity:0;
  animation:ldFade .8s .6s ease forwards;
}
.ld-bar-wrap{
  width:min(180px,55vw);
  height:1px;
  background:rgba(255,255,255,.06);
  margin-top:.5rem;
}
.ld-bar{
  height:100%;
  width:0;
  background:var(--gold);
  animation:ldBar 2.4s .5s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes ldBar{to{width:100%}}
@keyframes ldFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
#nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:500;
  padding:clamp(1rem,3vw,2rem) clamp(1.2rem,4vw,4rem);
  display:flex;
  align-items:center;
  justify-content:space-between;
  transition:padding .5s,background .5s,backdrop-filter .5s;
}
#nav.compact{
  padding:.9rem clamp(1.2rem,4vw,4rem);
  background:rgba(12,10,7,.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.nav-logo{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(1.1rem,2.5vw,1.35rem);
  color:var(--warm);
  line-height:1;
  z-index:2;
  font-weight:300;
}
.nav-logo span{
  display:block;
  font-family:var(--sans);
  font-style:normal;
  font-size:clamp(.5rem,1.1vw,.58rem);
  letter-spacing:.42em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:.25rem;
  font-weight:300;
}
.nav-links{
  display:flex;
  gap:clamp(1.5rem,3vw,3rem);
  list-style:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}
.nav-links a{
  font-size:clamp(.62rem,1.1vw,.72rem);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(237,232,223,.65);
  transition:color .3s;
  font-weight:300;
}
.nav-links a:hover{color:var(--warm)}
.nav-cta{
  font-size:clamp(.6rem,1.1vw,.68rem);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--gold);
  padding:.75rem clamp(1rem,2vw,1.6rem);
  font-weight:400;
  transition:background .3s;
}
.nav-cta:hover{background:var(--gold-hi)}
.nav-burger{
  display:none;
  flex-direction:column;
  gap:5px;
  background:none;
  border:none;
  cursor:pointer;
  padding:.3rem;
  z-index:2;
}
.nb-line{
  width:22px;
  height:1px;
  background:var(--warm);
  transition:transform .3s,opacity .3s;
}
.mobile-menu{
  display:none;
  position:fixed;
  inset:0;
  background:var(--ink2);
  z-index:490;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2.5rem;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease;
}
.mobile-menu.open{opacity:1;pointer-events:all}
.mm-link{
  font-family:var(--serif);
  font-size:clamp(2rem,9vw,2.8rem);
  font-style:italic;
  color:var(--warm);
  font-weight:300;
  transition:color .3s;
}
.mm-link:hover{color:var(--gold)}
.mm-cta{
  font-size:.7rem;
  letter-spacing:.24em;
  text-transform:uppercase;
  background:var(--gold);
  color:var(--ink);
  padding:1rem 2.8rem;
  margin-top:.5rem;
}
@media(max-width:900px){
  .nav-links{display:none}
  .nav-cta{display:none}
  .nav-burger{display:flex}
  .mobile-menu{display:flex}
}

/* HERO */
#hero{
  height:100svh;
  position:relative;
  overflow:hidden;
  min-height:600px;
}
.hero-slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 2s ease;
}
.hero-slide.active{opacity:1}
.hero-slide img{
  transform:scale(1.06);
  transition:transform 9s ease;
  object-position:center;
}
.hero-slide.active img{transform:scale(1)}
.hero-grad{
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top,rgba(12,10,7,.94) 0%,rgba(12,10,7,.42) 45%,rgba(12,10,7,.18) 100%),
    linear-gradient(90deg,rgba(12,10,7,.6) 0%,transparent 55%);
}
.hero-body{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0 clamp(1.4rem,5vw,5rem) clamp(4.5rem,9vw,6.5rem);
}
.hero-eyebrow{
  font-size:clamp(.62rem,1.8vw,.78rem);
  letter-spacing:.38em;
  text-transform:uppercase;
  color:rgba(212,168,92,.95);
  margin-bottom:clamp(.8rem,2.5vw,1.8rem);
  display:flex;
  align-items:center;
  gap:1rem;
  opacity:0;
  animation:hFade .9s 2.8s ease forwards;
}
.hero-eyebrow::before{
  content:'';
  width:24px;
  height:1px;
  background:rgba(184,145,74,.5);
}
.hero-h1{
  font-family:var(--serif);
  font-weight:300;
  font-size:clamp(3rem,9.5vw,9rem);
  line-height:.9;
  letter-spacing:-.01em;
  color:var(--warm);
  overflow:hidden;
}
.h1-line{
  display:block;
  transform:translateY(110%);
  animation:lineUp .95s cubic-bezier(.16,1,.3,1) forwards;
}
.h1-line:nth-child(1){animation-delay:2.5s}
.h1-line:nth-child(2){
  animation-delay:2.65s;
  font-style:italic;
  color:rgba(184,145,74,.95);
  padding-left:clamp(.8rem,4vw,3.5rem);
}
.h1-line:nth-child(3){animation-delay:2.8s}
@keyframes lineUp{to{transform:translateY(0)}}
@keyframes hFade{to{opacity:1}}
.hero-footer{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:1.5rem;
  margin-top:clamp(1.2rem,3.5vw,2.5rem);
  opacity:0;
  animation:hFade .9s 3.1s ease forwards;
}
.hero-desc{
  font-size:clamp(.82rem,1.7vw,.98rem);
  line-height:1.85;
  color:rgba(237,232,223,.78);
  max-width:430px;
  border-left:1px solid rgba(184,145,74,.35);
  padding-left:1.2rem;
  letter-spacing:.02em;
}
.hero-actions{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:.8rem;
}
@media(min-width:600px){
  .hero-actions{align-items:flex-end}
}
.hero-btn{
  display:inline-block;
  background:var(--gold);
  color:var(--ink);
  padding:1rem clamp(1.5rem,3vw,2.8rem);
  font-size:clamp(.66rem,1.4vw,.76rem);
  letter-spacing:.22em;
  text-transform:uppercase;
  font-weight:400;
  transition:background .3s;
}
.hero-btn:hover{background:var(--gold-hi)}
.hero-pills{
  display:flex;
  flex-wrap:wrap;
  gap:.45rem;
}
.pill{
  font-size:clamp(.56rem,1.1vw,.64rem);
  letter-spacing:.16em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,.16);
  padding:.4rem .8rem;
  color:rgba(237,232,223,.62);
}
.hero-dots{
  position:absolute;
  right:clamp(1rem,3vw,3rem);
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:.7rem;
  z-index:3;
}
.h-dot{
  width:2px;
  height:16px;
  background:rgba(255,255,255,.18);
  cursor:pointer;
  transition:height .4s,background .4s;
}
.h-dot.active{
  height:34px;
  background:var(--gold);
}
.scroll-hint{
  position:absolute;
  bottom:clamp(.8rem,2.5vw,2rem);
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.5rem;
  opacity:.55;
  z-index:3;
}
.sh-line{
  width:1px;
  height:36px;
  background:var(--warm-dim);
  overflow:hidden;
  position:relative;
}
.sh-line::after{
  content:'';
  position:absolute;
  top:-100%;
  left:0;
  width:100%;
  height:100%;
  background:var(--gold);
  animation:shDrop 2s ease-in-out infinite;
}
@keyframes shDrop{from{top:-100%}to{top:200%}}
.sh-label{
  font-size:.58rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:var(--warm-dim);
}

/* MARQUEE */
.marquee-wrap{
  background:var(--ink2);
  overflow:hidden;
  padding:1.1rem 0;
  border-top:1px solid rgba(255,255,255,.04);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.marquee-track{
  display:flex;
  white-space:nowrap;
  animation:mq 40s linear infinite;
}
.marquee-track:hover{animation-play-state:paused}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mq-item{
  display:inline-flex;
  align-items:center;
  gap:.8rem;
  padding:0 2rem;
  border-right:1px solid rgba(255,255,255,.05);
}
.mq-n{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(1.1rem,3vw,1.7rem);
  color:var(--gold);
  line-height:1;
  font-weight:300;
}
.mq-t{
  font-size:clamp(.58rem,1.1vw,.68rem);
  letter-spacing:.24em;
  text-transform:uppercase;
  color:rgba(237,232,223,.42);
}

/* SECTIONS */
.s{
  padding:clamp(4rem,10vw,10rem) clamp(1.2rem,5vw,5rem);
}
.s-dark{background:var(--ink2)}
.s-label{
  font-size:clamp(.62rem,1.4vw,.74rem);
  letter-spacing:.36em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:1.4rem;
  display:flex;
  align-items:center;
  gap:.8rem;
}
.s-label::before{
  content:'';
  width:20px;
  height:1px;
  background:var(--gold);
}
.s-h{
  font-family:var(--serif);
  font-weight:300;
  line-height:.95;
  font-size:clamp(2.4rem,5.5vw,5rem);
  letter-spacing:-.01em;
}
.s-h em{
  font-style:italic;
  color:var(--gold);
}
.s-h.dark{color:var(--ink)}
.s-h.dark em{color:var(--gold-lo)}
.divider{
  width:40px;
  height:1px;
  background:rgba(184,145,74,.2);
  margin:1.8rem 0;
}

/* STORY CARDS - MOBILE HORIZONTAL SWIPE */
.story-stack{
  display:flex;
  flex-direction:row;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
  gap:0;
  scrollbar-width:none;
}
.story-stack::-webkit-scrollbar{display:none}
.story-card{
  position:relative;
  overflow:hidden;
  flex-shrink:0;
  width:100vw;
  height:88vw;
  min-height:430px;
  scroll-snap-align:start;
}
@media(min-width:500px){
  .story-card{
    height:60vw;
    max-height:70vh;
  }
}
.story-card img{
  position:absolute;
  inset:0;
  transition:transform 8s ease;
}
.story-card:hover img{transform:scale(1.04)}
.sc-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(12,10,7,.93) 0%,rgba(12,10,7,.45) 55%,rgba(12,10,7,.22) 100%);
}
.sc-body{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:clamp(1.5rem,5vw,3rem);
}
.sc-num{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(2.8rem,7vw,4.4rem);
  color:rgba(255,255,255,.09);
  line-height:1;
  margin-bottom:-.4rem;
}
.sc-title{
  font-family:var(--serif);
  font-weight:300;
  font-size:clamp(1.8rem,4vw,2.7rem);
  color:var(--warm);
  line-height:1.05;
  margin-bottom:.8rem;
}
.sc-title em{
  font-style:italic;
  color:var(--gold-hi);
}
.sc-text{
  font-size:clamp(.88rem,1.9vw,1rem);
  line-height:1.8;
  color:rgba(237,232,223,.78);
  max-width:540px;
  letter-spacing:.02em;
}

/* STORY - DESKTOP STICKY */
.story-sticky-wrap{display:none}
.story-mobile-dots{
  display:flex;
  justify-content:center;
  gap:.5rem;
  padding:.9rem 0 .4rem;
  background:var(--ink);
}
.smd{
  width:20px;
  height:2px;
  background:rgba(255,255,255,.18);
  transition:all .3s;
  cursor:pointer;
}
.smd.active{
  width:40px;
  background:var(--gold);
}
@media(min-width:1024px){
  .story-mobile-dots{display:none}
  .story-stack{display:none}
  .story-sticky-wrap{
    display:block;
    height:400vh;
    position:relative;
  }
  .story-sticky-inner{
    position:sticky;
    top:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:stretch;
  }
  .story-track-h{
    display:flex;
    will-change:transform;
  }
  .story-panel-h{
    flex-shrink:0;
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .story-panel-h img{position:absolute;inset:0}
  .sph-overlay{position:absolute;inset:0}
  .sph-content{
    position:relative;
    z-index:2;
    text-align:center;
    max-width:760px;
    padding:3rem;
  }
  .sph-num{
    font-family:var(--serif);
    font-style:italic;
    font-size:9rem;
    font-weight:300;
    color:rgba(255,255,255,.06);
    line-height:1;
    margin-bottom:-1.5rem;
  }
  .sph-title{
    font-family:var(--serif);
    font-size:clamp(3rem,4.5vw,4.4rem);
    font-weight:300;
    color:var(--warm);
    line-height:1.02;
    margin-bottom:1.2rem;
  }
  .sph-title em{
    font-style:italic;
    color:var(--gold-hi);
  }
  .sph-text{
    font-size:.95rem;
    line-height:2;
    color:rgba(237,232,223,.78);
    max-width:560px;
    margin:0 auto;
    letter-spacing:.03em;
  }
  .sph-dots{
    position:absolute;
    bottom:2.5rem;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:.7rem;
  }
  .sph-dot{
    width:26px;
    height:2px;
    background:rgba(255,255,255,.18);
    transition:all .4s;
  }
  .sph-dot.active{
    width:52px;
    background:var(--gold);
  }
}

/* GALLERY */
.gallery-header{
  padding:clamp(3rem,7vw,6rem) clamp(1.2rem,5vw,5rem) clamp(1.5rem,3.5vw,3.5rem);
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:1.5rem;
}
.gal-link{
  font-size:clamp(.66rem,1.4vw,.78rem);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--warm-dim);
  border-bottom:1px solid rgba(255,255,255,.12);
  padding-bottom:.25rem;
  transition:color .3s,border-color .3s;
}
.gal-link:hover{
  color:var(--gold);
  border-color:var(--gold);
}
.gallery-mobile{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:3px;
}
@media(min-width:500px){
  .gallery-mobile{grid-template-columns:repeat(3,1fr)}
}
.gallery-mobile .gp{
  aspect-ratio:1;
  position:relative;
  overflow:hidden;
}
.gallery-mobile .gp img{
  transition:transform .7s ease;
}
.gallery-mobile .gp:hover img{transform:scale(1.07)}
.gallery-mobile .gp-cap{
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-end;
  padding:1rem;
  background:linear-gradient(to top,rgba(12,10,7,.82) 0%,transparent 60%);
  opacity:1;
  transition:opacity .4s;
}
.gp-name{
  font-family:var(--serif);
  font-size:1.1rem;
  font-style:italic;
  color:var(--warm);
  font-weight:300;
}
.gp-sub{
  font-size:.62rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(237,232,223,.62);
  margin-top:.2rem;
}
.gallery-desktop{display:none}
@media(min-width:1024px){
  .gallery-mobile{display:none}
  .gallery-desktop{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    grid-auto-rows:80px;
    gap:3px;
  }
  .gd{
    overflow:hidden;
    position:relative;
  }
  .gd img{
    transition:transform .8s cubic-bezier(.23,1,.32,1),filter .5s;
  }
  .gd:hover img{
    transform:scale(1.06);
    filter:brightness(.6);
  }
  .gd-cap{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:1.8rem;
    background:linear-gradient(to top,rgba(12,10,7,.78) 0%,transparent 60%);
    opacity:0;
    transition:opacity .5s;
  }
  .gd:hover .gd-cap{opacity:1}
  .gd1{grid-column:1/6;grid-row:1/9}
  .gd2{grid-column:6/10;grid-row:1/6}
  .gd3{grid-column:10/13;grid-row:1/5}
  .gd4{grid-column:6/9;grid-row:6/11}
  .gd5{grid-column:9/13;grid-row:5/9}
  .gd6{grid-column:1/4;grid-row:9/14}
  .gd7{grid-column:4/9;grid-row:11/15}
  .gd8{grid-column:9/13;grid-row:9/15}
}

/* EXPERIENCE */
.exp-mobile{
  display:flex;
  flex-direction:column;
  gap:2px;
}
@media(min-width:1024px){
  .exp-mobile{display:none}
}
.ec-m{
  background:var(--ink3);
  padding:clamp(1.5rem,4vw,2.4rem);
  border-bottom:1px solid rgba(255,255,255,.04);
  position:relative;
  overflow:hidden;
  transition:background .4s;
}
.ec-m::after{
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:2px;
  background:var(--gold);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .5s;
}
.ec-m:hover,.ec-m:active{background:var(--ink4)}
.ec-m:hover::after,.ec-m:active::after{transform:scaleX(1)}
.ec-m-num{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(2.3rem,6vw,3.8rem);
