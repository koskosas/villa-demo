<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Villa Solaris - Private Estate, Santorini</title>
<meta name="description" content="Villa Solaris is a private clifftop villa estate in Santorini with five bedrooms, an infinity pool, concierge service, private chef options, and caldera views."/>

<link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)"/>
<link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin/>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap)" rel="stylesheet"/>

<style>
*,*::before,*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --warm:#f0ebe2;
  --warm-dim:#a89c8c;
  --terra:#c07a52;
  --terra-hi:#d8967a;
  --terra-lo:#7a4e32;
  --ink:#0d0b08;
  --ink2:#161310;
  --ink3:#1f1b16;
  --ink4:#2a2520;
  --stone:#f5f0e8;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Inter',Arial,sans-serif;
}

html{
  scroll-behavior:smooth;
  -webkit-text-size-adjust:100%;
}

body{
  background:var(--ink);
  color:var(--warm);
  font-family:var(--sans);
  font-weight:300;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

body.menu-open{
  overflow:hidden;
}

a{
  color:inherit;
  text-decoration:none;
}

img{
  display:block;
  width:100%;
  height:100%;
  object-fit:cover;
}

button,
input,
select{
  font:inherit;
}

button,
a{
  touch-action:manipulation;
}

section,
div{
  scroll-margin-top:90px;
}

/* Loader */
#loader{
  position:fixed;
  inset:0;
  background:var(--ink);
  z-index:10000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1.5rem;
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transition:opacity .8s ease,visibility .8s ease;
}

#loader.out,
body.loaded #loader{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.ld-logo{
  font-family:var(--serif);
  font-size:clamp(1.4rem,5vw,2rem);
  font-style:italic;
  color:var(--warm);
  opacity:0;
  animation:ldFade .8s .2s ease forwards;
}

.ld-sub{
  font-size:clamp(.42rem,2vw,.52rem);
  letter-spacing:.45em;
  text-transform:uppercase;
  color:var(--terra);
  opacity:0;
  animation:ldFade .8s .45s ease forwards;
}

.ld-bar-wrap{
  width:min(200px,60vw);
  height:1px;
  background:rgba(255,255,255,.08);
}

.ld-bar{
  height:100%;
  width:0;
  background:var(--terra);
  animation:ldBar 1.8s .35s ease forwards;
}

@keyframes ldBar{
  to{width:100%}
}

@keyframes ldFade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Nav */
#nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:500;
  padding:clamp(1rem,3vw,2.2rem) clamp(1.2rem,4vw,4rem);
  display:flex;
  align-items:center;
  justify-content:space-between;
  transition:padding .5s,background .5s,backdrop-filter .5s;
}

#nav.compact,
body.menu-open #nav{
  padding:1rem clamp(1.2rem,4vw,4rem);
  background:rgba(13,11,8,.92);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.04);
}

.nav-logo{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(.95rem,2.5vw,1.15rem);
  color:var(--warm);
  line-height:1;
  z-index:502;
}

.nav-logo span{
  display:block;
  font-family:var(--sans);
  font-style:normal;
  font-size:clamp(.38rem,1.2vw,.44rem);
  letter-spacing:.5em;
  text-transform:uppercase;
  color:var(--terra);
  margin-bottom:.15rem;
  font-weight:300;
}

.nav-links{
  display:none;
  gap:clamp(1.5rem,3vw,3rem);
  list-style:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.nav-links a{
  font-size:clamp(.48rem,1.2vw,.56rem);
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(240,235,226,.5);
  transition:color .3s;
  font-weight:300;
}

.nav-links a:hover{
  color:var(--warm);
}

.nav-cta{
  display:none;
  font-size:clamp(.48rem,1.2vw,.54rem);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--terra);
  padding:.6rem clamp(.9rem,2vw,1.5rem);
  font-weight:400;
  transition:background .3s;
}

.nav-cta:hover,
.nav-cta:active{
  background:var(--terra-hi);
}

.nav-burger{
  display:flex;
  flex-direction:column;
  gap:5px;
  background:none;
  border:none;
  cursor:pointer;
  padding:.45rem;
  z-index:502;
}

.nb-line{
  width:24px;
  height:1px;
  background:var(--warm);
  transition:transform .3s,opacity .3s;
}

.mobile-menu{
  display:flex;
  position:fixed;
  inset:0;
  background:var(--ink2);
  z-index:490;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2.2rem;
  opacity:0;
  pointer-events:none;
  visibility:hidden;
  transform:translateY(-10px);
  transition:opacity .4s ease,visibility .4s ease,transform .4s ease;
}

.mobile-menu.open{
  opacity:1;
  pointer-events:all;
  visibility:visible;
  transform:translateY(0);
}

.mm-link{
  font-family:var(--serif);
  font-size:clamp(1.8rem,8vw,2.5rem);
  font-style:italic;
  color:var(--warm);
  font-weight:300;
  transition:color .3s,transform .3s,opacity .3s;
  opacity:0;
  transform:translateY(18px);
}

.mobile-menu.open .mm-link,
.mobile-menu.open .mm-cta{
  opacity:1;
  transform:translateY(0);
}

.mobile-menu.open .mm-link:nth-child(1){transition-delay:.05s}
.mobile-menu.open .mm-link:nth-child(2){transition-delay:.1s}
.mobile-menu.open .mm-link:nth-child(3){transition-delay:.15s}
.mobile-menu.open .mm-link:nth-child(4){transition-delay:.2s}
.mobile-menu.open .mm-link:nth-child(5){transition-delay:.25s}
.mobile-menu.open .mm-cta{transition-delay:.3s}

.mm-link:hover,
.mm-link:active{
  color:var(--terra);
}

.mm-cta{
  font-size:.58rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  background:var(--terra);
  color:var(--ink);
  padding:1rem 2.5rem;
  margin-top:1rem;
  opacity:0;
  transform:translateY(18px);
  transition:background .3s,transform .3s,opacity .3s;
}

@media(min-width:900px){
  .nav-links{
    display:flex;
  }

  .nav-cta{
    display:inline-block;
  }

  .nav-burger{
    display:none;
  }

  .mobile-menu{
    display:none;
  }
}

/* Hero */
#hero{
  height:100svh;
  min-height:520px;
  position:relative;
  overflow:hidden;
}

.hero-slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 1.8s ease;
}

.hero-slide.active{
  opacity:1;
}

.hero-slide img{
  transform:scale(1.08);
  transition:transform 8s ease;
  object-position:center;
}

.hero-slide.active img{
  transform:scale(1);
}

.hero-grad{
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top,rgba(13,11,8,.9) 0%,rgba(13,11,8,.35) 50%,rgba(13,11,8,.2) 100%),
    linear-gradient(100deg,rgba(13,11,8,.6) 0%,transparent 60%);
}

.hero-body{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0 clamp(1.2rem,5vw,5rem) clamp(4.2rem,10vw,7rem);
}

.hero-eyebrow{
  font-size:clamp(.42rem,1.8vw,.5rem);
  letter-spacing:.38em;
  text-transform:uppercase;
  color:rgba(192,122,82,.85);
  margin-bottom:clamp(1rem,3vw,2rem);
  display:flex;
  align-items:center;
  gap:1rem;
  opacity:0;
  animation:hFade .9s 1.5s ease forwards;
}

.hero-eyebrow::before{
  content:'';
  width:28px;
  height:1px;
  background:rgba(192,122,82,.5);
}

.hero-h1{
  font-family:var(--serif);
  font-weight:300;
  font-size:clamp(2.65rem,12vw,8.5rem);
  line-height:.92;
  letter-spacing:-.02em;
  color:var(--warm);
  overflow:hidden;
}

.h1-line{
  display:block;
  transform:translateY(110%);
  animation:lineUp .9s ease forwards;
}

.h1-line:nth-child(1){
  animation-delay:1.25s;
}

.h1-line:nth-child(2){
  animation-delay:1.4s;
  font-style:italic;
  color:rgba(192,122,82,.85);
  padding-left:clamp(1rem,5vw,4rem);
}

.h1-line:nth-child(3){
  animation-delay:1.55s;
}

@keyframes lineUp{
  to{transform:translateY(0)}
}

@keyframes hFade{
  to{opacity:1}
}

.hero-footer{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:1.5rem;
  margin-top:clamp(1.5rem,4vw,3rem);
  opacity:0;
  animation:hFade .9s 1.85s ease forwards;
}

.hero-desc{
  font-size:clamp(.62rem,1.8vw,.7rem);
  line-height:1.9;
  color:rgba(240,235,226,.58);
  max-width:360px;
  border-left:1px solid rgba(192,122,82,.3);
  padding-left:1.2rem;
  letter-spacing:.03em;
}

.hero-actions{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:.9rem;
}

.hero-btn{
  display:inline-block;
  background:var(--terra);
  color:var(--ink);
  padding:.95rem clamp(1.5rem,3vw,2.8rem);
  font-size:clamp(.5rem,1.5vw,.58rem);
  letter-spacing:.22em;
  text-transform:uppercase;
  font-weight:400;
  transition:background .3s,transform .3s;
}

.hero-btn:hover,
.hero-btn:active{
  background:var(--terra-hi);
}

.hero-pills{
  display:flex;
  flex-wrap:wrap;
  gap:.5rem;
}

.pill{
  font-size:clamp(.38rem,1.2vw,.46rem);
  letter-spacing:.18em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,.12);
  padding:.35rem .85rem;
  color:rgba(240,235,226,.42);
}

.hero-dots{
  position:absolute;
  right:clamp(1rem,3vw,3.5rem);
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:.7rem;
  z-index:3;
}

.h-dot{
  width:28px;
  height:3px;
  background:rgba(255,255,255,.2);
  cursor:pointer;
  transition:width .4s,background .4s,height .4s;
  border:none;
}

.h-dot.active{
  width:42px;
  background:var(--terra);
}

.scroll-hint{
  position:absolute;
  bottom:clamp(1rem,3vw,2.5rem);
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.6rem;
  opacity:.4;
  z-index:3;
}

.sh-line{
  width:1px;
  height:40px;
  background:var(--warm-dim);
  overflow:hidden;
  position:relative;
}

.sh-line::after{
  content:'';
  position:absolute;
  top:-100%;
  left:0;
  width:100%;
  height:100%;
  background:var(--terra);
  animation:shDrop 1.8s ease-in-out infinite;
}

@keyframes shDrop{
  from{top:-100%}
  to{top:200%}
}

.sh-label{
  font-size:.4rem;
  letter-spacing:.35em;
  text-transform:uppercase;
  color:var(--warm-dim);
}

@media(min-width:600px){
  #hero{
    min-height:600px;
  }

  .hero-actions{
    align-items:flex-end;
  }

  .hero-footer{
    align-items:flex-end;
  }

  .h-dot{
    width:2px;
    height:18px;
  }

  .h-dot.active{
    width:2px;
    height:36px;
  }
}

/* Marquee */
.marquee-wrap{
  background:var(--ink2);
  overflow:hidden;
  padding:1.2rem 0;
  border-top:1px solid rgba(255,255,255,.04);
  border-bottom:1px solid rgba(255,255,255,.04);
}

.marquee-track{
  display:flex;
  white-space:nowrap;
  animation:mq 35s linear infinite;
}

.marquee-track:hover{
  animation-play-state:paused;
}

@keyframes mq{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

.mq-item{
  display:inline-flex;
  align-items:center;
  gap:1rem;
  padding:0 2rem;
  border-right:1px solid rgba(255,255,255,.06);
}

.mq-n{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(1rem,3vw,1.6rem);
  color:var(--terra);
  line-height:1;
}

.mq-t{
  font-size:clamp(.4rem,1.2vw,.5rem);
  letter-spacing:.28em;
  text-transform:uppercase;
  color:rgba(240,235,226,.28);
}

/* Section utils */
.s{
  padding:clamp(4rem,10vw,10rem) clamp(1.2rem,5vw,5rem);
}

.s-dark{
  background:var(--ink2);
}

.s-label{
  font-size:clamp(.42rem,1.5vw,.5rem);
  letter-spacing:.45em;
  text-transform:uppercase;
  color:var(--terra);
  margin-bottom:1.5rem;
  display:flex;
  align-items:center;
  gap:1rem;
}

.s-label::before{
  content:'';
  width:22px;
  height:1px;
  background:var(--terra);
}

.s-h{
  font-family:var(--serif);
  font-weight:300;
  line-height:1;
  font-size:clamp(2rem,5vw,4.5rem);
  letter-spacing:-.01em;
}

.s-h em{
  font-style:italic;
  color:var(--terra);
}

.s-h.dark{
  color:var(--ink);
}

.s-h.dark em{
  color:var(--terra-lo);
}

.divider{
  width:44px;
  height:1px;
  background:rgba(192,122,82,.25);
  margin:2rem 0;
}

/* Reveal animations */
.reveal{
  opacity:0;
  transform:translateY(28px);
  transition:opacity .85s ease,transform .85s ease;
}

.reveal.r-l{
  transform:translateX(-28px);
}

.reveal.r-r{
  transform:translateX(28px);
}

.reveal.r-s{
  transform:scale(.96);
}

.reveal.in{
  opacity:1;
  transform:none;
}

.reveal.d1{transition-delay:.12s}
.reveal.d2{transition-delay:.24s}
.reveal.d3{transition-delay:.36s}

/* Story */
.story-stack{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.story-card{
  position:relative;
  overflow:hidden;
  min-height:90vw;
  opacity:0;
  transform:translateY(28px);
  transition:opacity .8s ease,transform .8s ease;
}

.story-card.in{
  opacity:1;
  transform:none;
}

.story-card img{
  position:absolute;
  inset:0;
  transform:scale(1.06);
  transition:transform 1.2s ease;
}

.story-card.in img{
  transform:scale(1);
}

.sc-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(13,11,8,.82) 0%,rgba(13,11,8,.25) 60%,rgba(13,11,8,.15) 100%);
}

.sc-body{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:clamp(1.5rem,5vw,3rem);
}

.sc-num{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(2.5rem,8vw,4.5rem);
  color:rgba(255,255,255,.06);
  line-height:1;
  margin-bottom:-.5rem;
}

.sc-title{
  font-family:var(--serif);
  font-weight:300;
  font-size:clamp(1.5rem,4vw,2.5rem);
  color:var(--warm);
  line-height:1.05;
  margin-bottom:.8rem;
}

.sc-title em{
  font-style:italic;
  color:var(--terra-hi);
}

.sc-text{
  font-size:clamp(.6rem,2vw,.72rem);
  line-height:1.9;
  color:rgba(240,235,226,.55);
  max-width:500px;
  letter-spacing:.03em;
}

.story-sticky-wrap{
  display:none;
}

@media(min-width:600px){
  .story-card{
    min-height:60vw;
    max-height:70vh;
  }
}

@media(min-width:1024px){
  .story-stack{
    display:none;
  }

  .story-sticky-wrap{
    display:block;
    height:400vh;
    position:relative;
  }

  .story-sticky-inner{
    position:sticky;
    top:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:stretch;
  }

  .story-track-h{
    display:flex;
    will-change:transform;
  }

  .story-panel-h{
    flex-shrink:0;
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .story-panel-h img{
    position:absolute;
    inset:0;
  }

  .sph-overlay{
    position:absolute;
    inset:0;
  }

  .sph-content{
    position:relative;
    z-index:2;
    text-align:center;
    max-width:680px;
    padding:3rem;
  }

  .sph-num{
    font-family:var(--serif);
    font-style:italic;
    font-size:8rem;
    font-weight:300;
    color:rgba(255,255,255,.04);
    line-height:1;
    margin-bottom:-1.5rem;
  }

  .sph-title{
    font-family:var(--serif);
    font-size:clamp(2.5rem,4vw,3.8rem);
    font-weight:300;
    color:var(--warm);
    line-height:1.05;
    margin-bottom:1.2rem;
  }

  .sph-title em{
    font-style:italic;
    color:var(--terra-hi);
  }

  .sph-text{
    font-size:.72rem;
    line-height:2;
    color:rgba(240,235,226,.5);
    max-width:480px;
    margin:0 auto;
    letter-spacing:.04em;
  }

  .sph-dots{
    position:absolute;
    bottom:2.5rem;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:.7rem;
  }

  .sph-dot{
    width:28px;
    height:2px;
    background:rgba(255,255,255,.15);
    transition:all .4s;
  }

  .sph-dot.active{
    width:54px;
    background:var(--terra);
  }
}

/* Gallery */
.gallery-header{
  padding:clamp(3rem,7vw,6rem) clamp(1.2rem,5vw,5rem) clamp(2rem,4vw,4rem);
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:1.5rem;
}

.gal-link{
  font-size:clamp(.5rem,1.5vw,.56rem);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--warm-dim);
  border-bottom:1px solid rgba(255,255,255,.1);
  padding-bottom:.25rem;
  transition:color .3s,border-color .3s;
}

.gal-link:hover,
.gal-link:active{
  color:var(--terra);
  border-color:var(--terra);
}

.gallery-mobile{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:3px;
}

.gallery-mobile .gp{
  aspect-ratio:1;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(24px) scale(.98);
  transition:opacity .7s ease,transform .7s ease;
}

.gallery-mobile.in .gp{
  opacity:1;
  transform:none;
}

.gallery-mobile.in .gp:nth-child(2){transition-delay:.06s}
.gallery-mobile.in .gp:nth-child(3){transition-delay:.12s}
.gallery-mobile.in .gp:nth-child(4){transition-delay:.18s}
.gallery-mobile.in .gp:nth-child(5){transition-delay:.24s}
.gallery-mobile.in .gp:nth-child(6){transition-delay:.3s}

.gallery-mobile .gp img{
  transition:transform .7s ease;
}

.gallery-mobile .gp-cap{
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-end;
  padding:1rem;
  background:linear-gradient(to top,rgba(13,11,8,.72) 0%,transparent 58%);
  opacity:1;
  transition:opacity .4s;
}

.gp-name{
  font-family:var(--serif);
  font-size:.85rem;
  font-style:italic;
  color:var(--warm);
}
